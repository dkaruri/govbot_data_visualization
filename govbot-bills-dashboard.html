<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Govbot Bill Counts</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #68707d;
      --line: #d9dee7;
      --paper: #f7f8fb;
      --panel: #ffffff;
      --blue: #2364aa;
      --green: #2f7d52;
      --red: #b94a48;
      --gold: #c58b25;
      --row: #eef3f8;
      --shadow: 0 10px 30px rgba(23, 32, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      font-weight: 750;
      letter-spacing: 0;
    }

    .source {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    main {
      padding: 22px 0 36px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric strong {
      font-size: 24px;
      line-height: 1;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 170px 160px 180px auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }

    input, select, button {
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
    }

    input, select {
      padding: 0 12px;
    }

    button {
      padding: 0 14px;
      cursor: pointer;
      font-weight: 650;
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(420px, 1.25fr) minmax(360px, 0.75fr);
      gap: 16px;
      align-items: start;
    }

    .timeline {
      margin-bottom: 16px;
    }

    .trending {
      margin-bottom: 16px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      min-height: 48px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      gap: 12px;
    }

    h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 750;
      letter-spacing: 0;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    .section-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .section-controls select {
      width: 170px;
      height: 34px;
      font-size: 13px;
    }

    .line-chart {
      position: relative;
      min-height: 340px;
      padding: 12px 14px 14px;
      overflow: hidden;
    }

    .line-chart svg {
      display: block;
      width: 100%;
      height: 320px;
      overflow: visible;
    }

    .axis text {
      fill: var(--muted);
      font-size: 12px;
    }

    .axis line,
    .grid line {
      stroke: var(--line);
      stroke-width: 1;
    }

    .timeline-line {
      fill: none;
      stroke: var(--blue);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .timeline-area {
      fill: url(#timelineGradient);
    }

    .focus-line {
      stroke: var(--gold);
      stroke-width: 1.5;
      stroke-dasharray: 4 4;
      opacity: 0;
    }

    .focus-dot {
      fill: var(--gold);
      stroke: #fff;
      stroke-width: 3;
      opacity: 0;
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      min-width: 132px;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      box-shadow: var(--shadow);
      opacity: 0;
      transition: opacity 120ms ease;
      z-index: 3;
    }

    .tooltip strong,
    .tooltip span {
      display: block;
      font-size: 12px;
      line-height: 1.25;
    }

    .tooltip span {
      color: #d8dde6;
      margin-top: 3px;
    }

    .chart {
      padding: 14px 18px 18px;
      max-height: 720px;
      overflow: auto;
    }

    .trending-list {
      padding: 12px 16px 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }

    .trend-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .trend-subject {
      min-width: 0;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .trend-count {
      font-variant-numeric: tabular-nums;
      color: var(--blue);
      font-weight: 750;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 58px minmax(180px, 1fr) 82px;
      gap: 12px;
      align-items: center;
      min-height: 30px;
    }

    .abbr {
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
    }

    .track {
      height: 16px;
      background: #e8edf3;
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      min-width: 2px;
      background: var(--bar-color, var(--blue));
    }

    .value {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      background: #f9fafc;
      color: #3f4854;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
      z-index: 1;
    }

    td:last-child, th:last-child {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    tbody tr:nth-child(even) {
      background: var(--row);
    }

    .table-wrap {
      max-height: 720px;
      overflow: auto;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 24px;
      border-radius: 999px;
      background: #e8f0f8;
      color: var(--blue);
      font-weight: 750;
      text-transform: uppercase;
      font-size: 12px;
    }

    @media (max-width: 880px) {
      .topbar, .toolbar {
        display: grid;
        grid-template-columns: 1fr;
      }

      .source {
        white-space: normal;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .wrap {
        width: min(100% - 20px, 1180px);
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .bar-row {
        grid-template-columns: 42px minmax(0, 1fr) 62px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <h1>Govbot Bill Counts</h1>
      <div class="source">Source: https://chihacknight.github.io/govbot/</div>
    </div>
  </header>

  <main class="wrap">
    <div class="metrics" id="metrics"></div>

    <section class="timeline">
      <div class="section-head">
        <h2>Bills By Month</h2>
        <span class="small" id="timelineLabel"></span>
      </div>
      <div class="line-chart" id="lineChart">
        <svg id="lineSvg" role="img" aria-label="Line graph of total U.S. bills by month and year"></svg>
        <div class="tooltip" id="lineTooltip"></div>
      </div>
    </section>

    <section class="trending">
      <div class="section-head">
        <h2>Trending</h2>
        <div class="section-controls">
          <select id="trendMonth">
            <option value="">Month</option>
          </select>
          <select id="trendSort">
            <option value="hot-desc">Hot topics</option>
            <option value="hot-asc">Least active</option>
            <option value="subject-asc">Subject A to Z</option>
          </select>
        </div>
      </div>
      <div class="trending-list" id="trendingList"></div>
    </section>

    <div class="toolbar">
      <input id="search" type="search" placeholder="Search state or repo" />
      <select id="monthFilter">
        <option value="all">All months</option>
      </select>
      <select id="limit">
        <option value="all">All states</option>
        <option value="10">Top 10</option>
        <option value="20">Top 20</option>
        <option value="30">Top 30</option>
      </select>
      <select id="sort">
        <option value="count-desc">Bills, high to low</option>
        <option value="count-asc">Bills, low to high</option>
        <option value="state-asc">State, A to Z</option>
        <option value="state-desc">State, Z to A</option>
      </select>
      <button id="export">Export CSV</button>
    </div>

    <div class="layout">
      <section>
        <div class="section-head">
          <h2>Bill Volume</h2>
          <span class="small" id="chartLabel"></span>
        </div>
        <div class="chart" id="chart"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>State Table</h2>
          <span class="small" id="tableLabel"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>State</th>
                <th>Repo</th>
                <th>Bills</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script>
    const fallbackData = [
      {"repo":"ak-legislation","state":"AK","count":514},
      {"repo":"al-legislation","state":"AL","count":1507},
      {"repo":"ar-legislation","state":"AR","count":1928},
      {"repo":"ca-legislation","state":"CA","count":5003},
      {"repo":"co-legislation","state":"CO","count":749},
      {"repo":"de-legislation","state":"DE","count":1274},
      {"repo":"fl-legislation","state":"FL","count":1927},
      {"repo":"ga-legislation","state":"GA","count":5646},
      {"repo":"gu-legislation","state":"GU","count":277},
      {"repo":"hi-legislation","state":"HI","count":8224},
      {"repo":"ia-legislation","state":"IA","count":3744},
      {"repo":"id-legislation","state":"ID","count":791},
      {"repo":"il-legislation","state":"IL","count":8648},
      {"repo":"in-legislation","state":"IN","count":40},
      {"repo":"ks-legislation","state":"KS","count":1483},
      {"repo":"ky-legislation","state":"KY","count":1515},
      {"repo":"la-legislation","state":"LA","count":19},
      {"repo":"ma-legislation","state":"MA","count":8975},
      {"repo":"md-legislation","state":"MD","count":3148},
      {"repo":"me-legislation","state":"ME","count":2451},
      {"repo":"mi-legislation","state":"MI","count":2360},
      {"repo":"mn-legislation","state":"MN","count":9859},
      {"repo":"mo-legislation","state":"MO","count":3221},
      {"repo":"mp-legislation","state":"MP","count":301},
      {"repo":"ms-legislation","state":"MS","count":3097},
      {"repo":"mt-legislation","state":"MT","count":4495},
      {"repo":"nc-legislation","state":"NC","count":1794},
      {"repo":"nd-legislation","state":"ND","count":1101},
      {"repo":"ne-legislation","state":"NE","count":1037},
      {"repo":"nh-legislation","state":"NH","count":2448},
      {"repo":"nj-legislation","state":"NJ","count":19456},
      {"repo":"nm-legislation","state":"NM","count":2},
      {"repo":"nv-legislation","state":"NV","count":27},
      {"repo":"ny-legislation","state":"NY","count":19407},
      {"repo":"oh-legislation","state":"OH","count":1538},
      {"repo":"ok-legislation","state":"OK","count":9262},
      {"repo":"or-legislation","state":"OR","count":267},
      {"repo":"pa-legislation","state":"PA","count":3578},
      {"repo":"pr-legislation","state":"PR","count":4998},
      {"repo":"ri-legislation","state":"RI","count":5612},
      {"repo":"sc-legislation","state":"SC","count":2244},
      {"repo":"sd-legislation","state":"SD","count":43},
      {"repo":"tn-legislation","state":"TN","count":6117},
      {"repo":"usa-legislation","state":"USA","count":11317},
      {"repo":"ut-legislation","state":"UT","count":26},
      {"repo":"vi-legislation","state":"VI","count":148},
      {"repo":"vt-legislation","state":"VT","count":898},
      {"repo":"wa-legislation","state":"WA","count":3411},
      {"repo":"wi-legislation","state":"WI","count":1626},
      {"repo":"wv-legislation","state":"WV","count":3315},
      {"repo":"wy-legislation","state":"WY","count":579}
    ];

    const names = {
      AK: "Alaska", AL: "Alabama", AR: "Arkansas", CA: "California", CO: "Colorado",
      DE: "Delaware", FL: "Florida", GA: "Georgia", GU: "Guam", HI: "Hawaii",
      IA: "Iowa", ID: "Idaho", IL: "Illinois", IN: "Indiana", KS: "Kansas",
      KY: "Kentucky", LA: "Louisiana", MA: "Massachusetts", MD: "Maryland",
      ME: "Maine", MI: "Michigan", MN: "Minnesota", MO: "Missouri",
      MP: "Northern Mariana Islands", MS: "Mississippi", MT: "Montana",
      NC: "North Carolina", ND: "North Dakota", NE: "Nebraska",
      NH: "New Hampshire", NJ: "New Jersey", NM: "New Mexico", NV: "Nevada",
      NY: "New York", OH: "Ohio", OK: "Oklahoma", OR: "Oregon",
      PA: "Pennsylvania", PR: "Puerto Rico", RI: "Rhode Island",
      SC: "South Carolina", SD: "South Dakota", TN: "Tennessee", USA: "Federal",
      UT: "Utah", VI: "U.S. Virgin Islands", VT: "Vermont", WA: "Washington",
      WI: "Wisconsin", WV: "West Virginia", WY: "Wyoming"
    };

    let data = [];
    let monthlyData = [];
    let monthlyByState = [];
    let trendingSubjects = [];
    const fmt = new Intl.NumberFormat();

    const els = {
      metrics: document.getElementById("metrics"),
      search: document.getElementById("search"),
      monthFilter: document.getElementById("monthFilter"),
      limit: document.getElementById("limit"),
      sort: document.getElementById("sort"),
      chart: document.getElementById("chart"),
      lineChart: document.getElementById("lineChart"),
      lineSvg: document.getElementById("lineSvg"),
      lineTooltip: document.getElementById("lineTooltip"),
      trendMonth: document.getElementById("trendMonth"),
      trendSort: document.getElementById("trendSort"),
      trendingList: document.getElementById("trendingList"),
      tbody: document.getElementById("tbody"),
      chartLabel: document.getElementById("chartLabel"),
      timelineLabel: document.getElementById("timelineLabel"),
      tableLabel: document.getElementById("tableLabel"),
      export: document.getElementById("export")
    };

    function activeDataset() {
      const month = els.monthFilter.value;
      if (month === "all") return data;
      const monthlyRows = monthlyByState.filter(row => row.month === month);
      const byRepo = new Map(monthlyRows.map(row => [row.repo, row.count]));
      return data.map(row => ({
        ...row,
        count: byRepo.get(row.repo) || 0
      }));
    }

    function getRows() {
      const query = els.search.value.trim().toLowerCase();
      const limit = els.limit.value;
      const sort = els.sort.value;
      let rows = activeDataset().filter(row =>
        row.state.toLowerCase().includes(query) ||
        row.name.toLowerCase().includes(query) ||
        row.repo.toLowerCase().includes(query)
      );

      rows.sort((a, b) => {
        if (sort === "count-asc") return a.count - b.count;
        if (sort === "state-asc") return a.state.localeCompare(b.state);
        if (sort === "state-desc") return b.state.localeCompare(a.state);
        return b.count - a.count;
      });

      if (limit !== "all") rows = rows.slice(0, Number(limit));
      return rows;
    }

    function normalizeRows(rows) {
      return rows.map(row => {
        const state = String(row.state || "").toUpperCase();
        return {
          repo: row.repo,
          state,
          count: Number(row.count) || 0,
          name: names[state] || state
        };
      });
    }

    function normalizeMonthly(rows) {
      return rows
        .map(row => ({
          month: String(row.month || ""),
          count: Number(row.count) || 0
        }))
        .filter(row => /^\d{4}-\d{2}$/.test(row.month))
        .sort((a, b) => a.month.localeCompare(b.month));
    }

    function normalizeMonthlyByState(rows) {
      return rows
        .map(row => {
          const state = String(row.state || "").toUpperCase();
          return {
            month: String(row.month || ""),
            repo: row.repo,
            state,
            count: Number(row.count) || 0,
            name: names[state] || state
          };
        })
        .filter(row => /^\d{4}-\d{2}$/.test(row.month))
        .sort((a, b) => a.month.localeCompare(b.month) || a.state.localeCompare(b.state));
    }

    function normalizeTrendingSubjects(rows) {
      return rows
        .map(row => ({
          month: String(row.month || ""),
          subject: String(row.subject || "").trim(),
          count: Number(row.count) || 0
        }))
        .filter(row => /^\d{4}-\d{2}$/.test(row.month) && row.subject)
        .sort((a, b) => a.month.localeCompare(b.month) || b.count - a.count || a.subject.localeCompare(b.subject));
    }

    function populateMonthFilter() {
      const current = els.monthFilter.value;
      const months = monthlyData
        .filter(row => row.month >= "2024-01")
        .map(row => row.month);
      els.monthFilter.innerHTML = `<option value="all">All months</option>` + months.map(month => (
        `<option value="${month}">${formatMonth(month)}</option>`
      )).join("");
      if (months.includes(current)) els.monthFilter.value = current;
    }

    function populateTrendMonthFilter() {
      const current = els.trendMonth.value;
      const months = Array.from(new Set(
        trendingSubjects
          .filter(row => row.month >= "2024-01")
          .map(row => row.month)
      )).sort();
      els.trendMonth.innerHTML = months.map(month => (
        `<option value="${month}">${formatMonth(month)}</option>`
      )).join("");
      if (months.includes(current)) {
        els.trendMonth.value = current;
      } else if (months.length) {
        els.trendMonth.value = months.at(-1);
      }
    }

    function formatMonth(month) {
      const [year, monthNumber] = month.split("-").map(Number);
      const date = new Date(Date.UTC(year, monthNumber - 1, 1));
      return date.toLocaleString(undefined, { month: "long", year: "numeric", timeZone: "UTC" });
    }

    function formatShortMonth(month) {
      const [year, monthNumber] = month.split("-").map(Number);
      const date = new Date(Date.UTC(year, monthNumber - 1, 1));
      return date.toLocaleString(undefined, { month: "short", timeZone: "UTC" });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function curvedPath(points) {
      if (points.length < 2) return points.length ? `M ${points[0][0]} ${points[0][1]}` : "";
      let path = `M ${points[0][0].toFixed(2)} ${points[0][1].toFixed(2)}`;
      for (let index = 1; index < points.length; index++) {
        const [x0, y0] = points[index - 1];
        const [x1, y1] = points[index];
        const midX = (x0 + x1) / 2;
        path += ` C ${midX.toFixed(2)} ${y0.toFixed(2)}, ${midX.toFixed(2)} ${y1.toFixed(2)}, ${x1.toFixed(2)} ${y1.toFixed(2)}`;
      }
      return path;
    }

    function renderMetrics(rows) {
      const scopedData = activeDataset();
      const total = scopedData.reduce((sum, row) => sum + row.count, 0);
      const visible = rows.reduce((sum, row) => sum + row.count, 0);
      const max = scopedData.reduce((best, row) => row.count > best.count ? row : best, { state: "N/A", count: 0 });
      const avg = scopedData.length ? Math.round(total / scopedData.length) : 0;
      els.metrics.innerHTML = [
        [els.monthFilter.value === "all" ? "Total Bills" : "Month Bills", fmt.format(total)],
        ["Visible Bills", fmt.format(visible)],
        ["Top State", `${max.state} - ${fmt.format(max.count)}`],
        ["Average", fmt.format(avg)]
      ].map(([label, value]) => `
        <div class="metric">
          <span>${label}</span>
          <strong>${value}</strong>
        </div>
      `).join("");
    }

    function renderChart(rows) {
      const max = Math.max(1, ...activeDataset().map(row => row.count));
      const top = [35, 100, 170];
      const bottom = [47, 125, 82];
      const mix = (a, b, t) => Math.round(a + (b - a) * t);
      els.chart.innerHTML = rows.map((row, index) => {
        const width = Math.max(0.5, row.count / max * 100);
        const t = rows.length <= 1 ? 0 : index / (rows.length - 1);
        const color = `rgb(${mix(top[0], bottom[0], t)}, ${mix(top[1], bottom[1], t)}, ${mix(top[2], bottom[2], t)})`;
        return `
          <div class="bar-row" title="${row.name}: ${fmt.format(row.count)} bills">
            <div class="abbr">${row.state}</div>
            <div class="track"><div class="fill" style="width:${width}%; --bar-color:${color}"></div></div>
            <div class="value">${fmt.format(row.count)}</div>
          </div>
        `;
      }).join("");
      els.chartLabel.textContent = `${rows.length} rows`;
    }

    function renderLineChart() {
      const rows = monthlyData.filter(row => row.month >= "2024-01");
      const margin = { top: 40, right: 40, bottom: 58, left: 74 };
      const width = 920;
      const height = 320;
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      if (!rows.length) {
        els.lineSvg.setAttribute("viewBox", `0 0 ${width} ${height}`);
        els.lineSvg.style.width = "100%";
        els.lineSvg.innerHTML = `<text x="${width / 2}" y="${height / 2}" text-anchor="middle" fill="#68707d">No monthly data available yet</text>`;
        els.timelineLabel.textContent = "0 months";
        return;
      }

      const maxCount = 45000;
      const xStep = rows.length <= 1 ? innerWidth : innerWidth / (rows.length - 1);
      const xFor = index => margin.left + index * xStep;
      const yFor = count => margin.top + innerHeight - (count / maxCount) * innerHeight;
      const points = rows.map((row, index) => [xFor(index), yFor(row.count)]);
      const linePath = curvedPath(points);
      const areaPath = `${linePath} L ${points.at(-1)[0].toFixed(2)} ${margin.top + innerHeight} L ${points[0][0].toFixed(2)} ${margin.top + innerHeight} Z`;
      const yTicks = Array.from({ length: 10 }, (_, index) => index * 5000);

      const grid = yTicks.map(tick => {
        const y = yFor(tick);
        return `
          <g class="grid">
            <line x1="${margin.left}" x2="${width - margin.right}" y1="${y}" y2="${y}"></line>
          </g>
          <g class="axis">
            <text x="${margin.left - 10}" y="${y + 4}" text-anchor="end">${fmt.format(tick)}</text>
          </g>
        `;
      }).join("");

      const xLabels = rows.map((row, index) => {
        const x = xFor(index);
        const [year, month] = row.month.split("-");
        return `
          <g class="axis">
            <line x1="${x}" x2="${x}" y1="${margin.top + innerHeight}" y2="${margin.top + innerHeight + 5}"></line>
            <text x="${x}" y="${height - 24}" text-anchor="middle">${formatShortMonth(row.month)}</text>
          </g>
        `;
      }).join("");

      els.lineSvg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      els.lineSvg.style.width = "100%";
      els.lineSvg.innerHTML = `
        <defs>
          <linearGradient id="timelineGradient" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#2364aa" stop-opacity="0.35"></stop>
            <stop offset="100%" stop-color="#2364aa" stop-opacity="0.02"></stop>
          </linearGradient>
        </defs>
        ${grid}
        <g class="axis">
          <line x1="${margin.left}" x2="${margin.left}" y1="${margin.top}" y2="${margin.top + innerHeight}"></line>
          <line x1="${margin.left}" x2="${width - margin.right}" y1="${margin.top + innerHeight}" y2="${margin.top + innerHeight}"></line>
          <text x="18" y="${margin.top + innerHeight / 2}" transform="rotate(-90 18 ${margin.top + innerHeight / 2})" text-anchor="middle">Bills</text>
        </g>
        ${xLabels}
        <path class="timeline-area" d="${areaPath}"></path>
        <path class="timeline-line" d="${linePath}"></path>
        <line id="focusLine" class="focus-line" x1="0" x2="0" y1="${margin.top}" y2="${margin.top + innerHeight}"></line>
        <circle id="focusDot" class="focus-dot" cx="0" cy="0" r="5"></circle>
        <rect id="lineHitArea" x="${margin.left}" y="${margin.top}" width="${innerWidth}" height="${innerHeight}" fill="transparent" pointer-events="all"></rect>
      `;

      const focusLine = els.lineSvg.querySelector("#focusLine");
      const focusDot = els.lineSvg.querySelector("#focusDot");
      const hitArea = els.lineSvg.querySelector("#lineHitArea");
      const pointForEvent = event => {
        const svgPoint = els.lineSvg.createSVGPoint();
        svgPoint.x = event.clientX;
        svgPoint.y = event.clientY;
        const localPoint = svgPoint.matrixTransform(els.lineSvg.getScreenCTM().inverse());
        const svgX = Math.max(margin.left, Math.min(width - margin.right, localPoint.x));
        const index = Math.max(0, Math.min(rows.length - 1, Math.round((svgX - margin.left) / xStep)));
        return { index, x: xFor(index), y: yFor(rows[index].count), pointerX: localPoint.x, pointerY: localPoint.y, row: rows[index] };
      };

      hitArea.addEventListener("pointermove", event => {
        const point = pointForEvent(event);
        focusLine.setAttribute("x1", point.x);
        focusLine.setAttribute("x2", point.x);
        focusLine.style.opacity = "1";
        focusDot.setAttribute("cx", point.x);
        focusDot.setAttribute("cy", point.y);
        focusDot.style.opacity = "1";
        els.lineTooltip.innerHTML = `<strong>${formatMonth(point.row.month)}</strong><span>${fmt.format(point.row.count)} bills</span>`;
        const chartRect = els.lineChart.getBoundingClientRect();
        const tooltipX = Math.min(event.clientX - chartRect.left + 14, chartRect.width - 156);
        const tooltipY = Math.max(event.clientY - chartRect.top - 12, 46);
        els.lineTooltip.style.left = `${tooltipX}px`;
        els.lineTooltip.style.top = `${tooltipY}px`;
        els.lineTooltip.style.opacity = "1";
      });

      hitArea.addEventListener("pointerleave", () => {
        focusLine.style.opacity = "0";
        focusDot.style.opacity = "0";
        els.lineTooltip.style.opacity = "0";
      });

      els.timelineLabel.textContent = `${formatMonth(rows[0].month)} to ${formatMonth(rows.at(-1).month)}`;
    }

    function renderTrending() {
      const month = els.trendMonth.value;
      const sort = els.trendSort.value;
      let rows = trendingSubjects.filter(row => row.month === month);

      rows.sort((a, b) => {
        if (sort === "hot-asc") return a.count - b.count || a.subject.localeCompare(b.subject);
        if (sort === "subject-asc") return a.subject.localeCompare(b.subject);
        return b.count - a.count || a.subject.localeCompare(b.subject);
      });

      rows = rows.slice(0, 12);
      if (!rows.length) {
        els.trendingList.innerHTML = `<div class="small">No subject data available for this month.</div>`;
        return;
      }

      els.trendingList.innerHTML = rows.map(row => `
        <div class="trend-row" title="${escapeHtml(row.subject)}: ${fmt.format(row.count)} bills">
          <div class="trend-subject">${escapeHtml(row.subject)}</div>
          <div class="trend-count">${fmt.format(row.count)}</div>
        </div>
      `).join("");
    }

    function renderTable(rows) {
      els.tbody.innerHTML = rows.map(row => `
        <tr>
          <td><span class="badge">${row.state}</span> ${row.name}</td>
          <td>${row.repo}</td>
          <td>${fmt.format(row.count)}</td>
        </tr>
      `).join("");
      const suffix = els.monthFilter.value === "all" ? "all months" : formatMonth(els.monthFilter.value);
      els.tableLabel.textContent = `${rows.length} of ${data.length} - ${suffix}`;
    }

    function render() {
      const rows = getRows();
      renderMetrics(rows);
      renderLineChart();
      renderTrending();
      renderChart(rows);
      renderTable(rows);
    }

    function exportCsv() {
      const rows = getRows();
      const csv = [
        ["state", "name", "repo", "bill_count"],
        ...rows.map(row => [row.state, row.name, row.repo, row.count])
      ].map(row => row.map(value => `"${String(value).replaceAll('"', '""')}"`).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "govbot-bill-counts.csv";
      link.click();
      URL.revokeObjectURL(url);
    }

    async function loadData() {
      try {
        const response = await fetch("./data/bill-counts.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        data = normalizeRows(payload.rows || []);
        monthlyData = normalizeMonthly(payload.monthly_totals || []);
        monthlyByState = normalizeMonthlyByState(payload.monthly_by_state || []);
        trendingSubjects = normalizeTrendingSubjects(payload.trending_subjects || []);
      } catch (error) {
        data = normalizeRows(fallbackData);
        monthlyData = [];
        monthlyByState = [];
        trendingSubjects = [];
      }
      populateMonthFilter();
      populateTrendMonthFilter();
      render();
    }

    els.search.addEventListener("input", render);
    els.monthFilter.addEventListener("change", render);
    els.trendMonth.addEventListener("change", render);
    els.trendSort.addEventListener("change", render);
    els.limit.addEventListener("change", render);
    els.sort.addEventListener("change", render);
    els.export.addEventListener("click", exportCsv);
    loadData();
  </script>
</body>
</html>
